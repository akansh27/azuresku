# .github/ISSUE_TEMPLATE/platform_request.yml
name: Platform request / Onboarding
description: Request onboarding, platform integrations, or feature/support work.
title: "[Platform] {{ request_type }} - {{ short_title }}"
labels: triage
body:
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      options:
        - Onboarding
        - Feature
        - Support
  - type: input
    id: short_title
    attributes:
      label: Short title
      placeholder: e.g., "Add CI/CD for payments service"
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Urgent
