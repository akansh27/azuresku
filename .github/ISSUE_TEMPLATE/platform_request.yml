# .github/ISSUE_TEMPLATE/platform_request.yml
name: Platform request / Onboarding
description: Request onboarding, platform integrations, or feature/support work.
title: "[Platform] {{ request_type }} - {{ short_title }}"
labels: triage
body:
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      options:
        - Onboarding
        - Feature
        - Support
  - type: input
    id: short_title
    attributes:
      label: Short title
      placeholder: e.g., "Add CI/CD for payments service"
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Full details, links, or steps to reproduce
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Urgent
  - type: input
    id: team
    attributes:
      label: Requesting team / contact
      placeholder: e.g., "Payments Team"
  - type: input
    id: desired_date
    attributes:
      label: Desired completion date (optional)
      placeholder: YYYY-MM-DD
  - type: textarea
    id: links
    attributes:
      label: Links & repos
      description: Add repo links, docs, screenshots
